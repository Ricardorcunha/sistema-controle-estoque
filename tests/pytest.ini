[pytest]
# Indica ao pytest-django qual settings usar durante os testes
DJANGO_SETTINGS_MODULE = config.settings.development

# Prefixo dos arquivos de teste
python_files = test_*.py *_test.py

# Prefixo das classes de teste
python_classes = Test*

# Prefixo das funções de teste
python_functions = test_*

# Diretório raiz dos testes
testpaths = tests apps

# Opções padrão do pytest
addopts =
    # Mostra saída detalhada
    -v
    # Mostra cobertura de código
    --cov=apps
    # Formato do relatório de cobertura
    --cov-report=term-missing
    --cov-report=html:htmlcov
    # Falha se cobertura cair abaixo de 80%
    --cov-fail-under=80
    # Modo estrito: warnings viram erros
    -W error::DeprecationWarning
