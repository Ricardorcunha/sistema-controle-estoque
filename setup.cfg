[flake8]
# Configuração do linter flake8
max-line-length = 100
exclude =
    .git,
    __pycache__,
    .venv,
    venv,
    migrations,
    staticfiles,
    .eggs,
    build,
    dist
extend-ignore =
    # E501: line too long (já controlado por max-line-length)
    E501,
    # W503: line break before binary operator (conflita com black)
    W503

[isort]
# Configuração do isort (organiza imports)
profile = black
multi_line_output = 3
include_trailing_comma = True
force_grid_wrap = 0
use_parentheses = True
ensure_newline_before_comments = True
line_length = 100
known_django = django
known_first_party = apps, config
sections = FUTURE, STDLIB, DJANGO, THIRDPARTY, FIRSTPARTY, LOCALFOLDER

[mypy]
# Configuração do mypy (type checking)
python_version = 3.12
check_untyped_defs = True
ignore_missing_imports = True
warn_unused_ignores = True
warn_redundant_casts = True
plugins = mypy_django_plugin.main

[mypy.plugins.django-stubs]
django_settings_module = config.settings.development
