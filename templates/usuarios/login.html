<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Sistema de Controle de Estoque</title>
    <!-- Bootstrap 5 via CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
          rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #1e3a5f 0%, #2d6a4f 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
        }
        .login-card {
            border: none;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .login-header {
            background: linear-gradient(135deg, #1e3a5f, #2d6a4f);
            border-radius: 16px 16px 0 0;
            padding: 2rem;
            text-align: center;
            color: white;
        }
        .login-header i {
            font-size: 3rem;
            margin-bottom: 0.5rem;
        }
        .btn-login {
            background: linear-gradient(135deg, #1e3a5f, #2d6a4f);
            border: none;
            padding: 0.75rem;
            font-size: 1rem;
            font-weight: 600;
            letter-spacing: 0.5px;
        }
        .btn-login:hover {
            opacity: 0.9;
            transform: translateY(-1px);
            transition: all 0.2s;
        }
        .form-control:focus {
            border-color: #2d6a4f;
            box-shadow: 0 0 0 0.2rem rgba(45, 106, 79, 0.25);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5 col-lg-4">

                <div class="card login-card">
                    <!-- Header -->
                    <div class="login-header">
                        <i class="bi bi-boxes"></i>
                        <h4 class="mb-0 fw-bold">Sistema de Estoque</h4>
                        <small class="opacity-75">Controle de inventário</small>
                    </div>

                    <!-- Formulário -->
                    <div class="card-body p-4">
                        <h5 class="card-title text-center mb-4 text-muted">
                            Acesse sua conta
                        </h5>

                        <!-- Mensagens de erro -->
                        {% if form.errors %}
                            <div class="alert alert-danger alert-dismissible fade show" role="alert">
                                <i class="bi bi-exclamation-triangle-fill me-2"></i>
                                <strong>Credenciais inválidas.</strong>
                                Verifique seu usuário e senha.
                                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                            </div>
                        {% endif %}

                        <!-- Mensagens de sistema (ex: sessão expirada) -->
                        {% if messages %}
                            {% for message in messages %}
                                <div class="alert alert-{{ message.tags }} alert-dismissible fade show">
                                    {{ message }}
                                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                                </div>
                            {% endfor %}
                        {% endif %}

                        <form method="post" novalidate>
                            {% csrf_token %}

                            <!-- Campo: Usuário -->
                            <div class="mb-3">
                                <label for="{{ form.username.id_for_label }}"
                                       class="form-label fw-semibold">
                                    <i class="bi bi-person me-1"></i>Usuário
                                </label>
                                <input type="text"
                                       name="{{ form.username.html_name }}"
                                       id="{{ form.username.id_for_label }}"
                                       class="form-control form-control-lg {% if form.username.errors %}is-invalid{% endif %}"
                                       placeholder="Digite seu usuário"
                                       autofocus
                                       autocomplete="username"
                                       value="{{ form.username.value|default:'' }}">
                            </div>

                            <!-- Campo: Senha -->
                            <div class="mb-4">
                                <label for="{{ form.password.id_for_label }}"
                                       class="form-label fw-semibold">
                                    <i class="bi bi-lock me-1"></i>Senha
                                </label>
                                <div class="input-group">
                                    <input type="password"
                                           name="{{ form.password.html_name }}"
                                           id="{{ form.password.id_for_label }}"
                                           class="form-control form-control-lg"
                                           placeholder="Digite sua senha"
                                           autocomplete="current-password">
                                    <!-- Botão para mostrar/ocultar senha -->
                                    <button class="btn btn-outline-secondary"
                                            type="button"
                                            id="togglePassword"
                                            title="Mostrar/ocultar senha">
                                        <i class="bi bi-eye" id="toggleIcon"></i>
                                    </button>
                                </div>
                            </div>

                            <!-- Campo oculto: next (para redirecionar após login) -->
                            <input type="hidden" name="next" value="{{ next }}">

                            <!-- Botão de submit -->
                            <div class="d-grid">
                                <button type="submit" class="btn btn-primary btn-login text-white">
                                    <i class="bi bi-box-arrow-in-right me-2"></i>
                                    Entrar
                                </button>
                            </div>
                        </form>
                    </div>

                    <!-- Footer do card -->
                    <div class="card-footer text-center text-muted py-3 bg-light"
                         style="border-radius: 0 0 16px 16px;">
                        <small>
                            <i class="bi bi-shield-lock me-1"></i>
                            Acesso restrito a usuários autorizados
                        </small>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Toggle mostrar/ocultar senha
        document.getElementById('togglePassword').addEventListener('click', function() {
            const input = document.getElementById('{{ form.password.id_for_label }}');
            const icon = document.getElementById('toggleIcon');
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.replace('bi-eye', 'bi-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.replace('bi-eye-slash', 'bi-eye');
            }
        });
    </script>
</body>
</html>
